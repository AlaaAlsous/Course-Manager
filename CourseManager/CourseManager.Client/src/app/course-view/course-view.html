<app-layout [title]="title()">
  <section class="kurstillfalle-overview">
    <header class="app-page-header kurstillfalle-overview__header">
      <div class="app-page-header__content">
        @if (isEditing()) {
          <div class="kurstillfalle-overview__title-row">
            <input class="inline-edit-input" [(ngModel)]="editName" (keyup.enter)="saveEdit()" />
            <div class="kurstillfalle-overview__title-actions">
              <button type="button" class="app-back-button" (click)="saveEdit()">Spara</button>
              <button type="button" class="app-back-button" (click)="cancelEdit()">Avbryt</button>
            </div>
          </div>
        } @else {
          <div class="kurstillfalle-overview__title-row">
            <h2>{{ title() }}</h2>
            <div class="kurstillfalle-overview__title-actions">
              <button type="button" class="app-back-button" (click)="startEdit()">Redigera</button>
              <button type="button" class="app-back-button" (click)="deleteCourse()">
                Ta bort program
              </button>
            </div>
          </div>
        }
      </div>

      @if (!isEditing()) {
        <div class="kurstillfalle-overview__actions">
          <button type="button" class="app-back-button" [routerLink]="createKurstillfalleRoute()">
            Skapa kurstillfälle
          </button>
          <button type="button" class="app-back-button" (click)="goBack()">Tillbaka</button>
        </div>
      }
    </header>

    <ul class="kurstillfalle-list">
      @for (section of sections(); track section.id) {
        <li class="kurstillfalle-list__item" [routerLink]="sectionRoute(section.id)">
          <div class="kurstillfalle-card-row">
            <div class="kurstillfalle-card">
              <h3>{{ section.name }}</h3>
              <p>{{ section.groupCount }} grupper</p>
            </div>
            <button
              type="button"
              class="app-back-button"
              (click)="$event.stopPropagation(); deleteSection(section.id)"
            >
              Ta bort
            </button>
          </div>
        </li>
      } @empty {
        <span>Inga kurstillfällen tillgängliga</span>
      }
    </ul>
  </section>

  <app-content-module></app-content-module>
</app-layout>
