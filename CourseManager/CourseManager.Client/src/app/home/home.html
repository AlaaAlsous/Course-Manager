<app-layout [title]="title()">
  <div class="home-actions">
    <button (click)="createCourse()">Skapa kurs</button>
  </div>

  <div class="course-grid">
    <h2>Befintliga kurser</h2>

    <p *ngIf="courses().length === 0" class="empty-state">Inga kurser att visa.</p>

    <div class="course-cards" *ngIf="courses().length > 0">
      <article *ngFor="let c of courses()" class="course-card clickable" (click)="goToCourse(c.id)">
        <div class="item-row">
          <span>{{ c.name }}</span>
          <small>Skapad {{ getRelativeDate(c.created) }}</small>
        </div>

        <svg class="icon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
          <path
            fill-rule="evenodd"
            d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z"
            clip-rule="evenodd"
          />
        </svg>
      </article>
    </div>
  </div>

  <app-snackbar></app-snackbar>
</app-layout>
