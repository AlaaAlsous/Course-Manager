<app-layout [title]="title()">
  <header class="app-page-header participant-creator__header">
    <div class="app-page-header__content">
      <h2>Create a Participant</h2>
    </div>

    <button type="button" class="app-back-button" (click)="goBack()">Tillbaka</button>
  </header>

  <form (submit)="createPerson()">
    <div class="form-input">
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" required placeholder="Firstname Lastname" />
    </div>

    <div class="form-input">
      <label for="email">Email (optional):</label>
      <input type="email" id="email" name="email" placeholder="mail@example.com" />
    </div>
    <div class="form-input">
      <label for="phone">Phone Number (optional):</label>
      <input type="tel" id="mobile" name="mobile" placeholder="070 1234567" />
    </div>

    <button type="submit">Create Participant</button>
  </form>
</app-layout>
