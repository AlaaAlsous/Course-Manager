<app-layout [title]="title()">
  <header class="app-page-header participant-creator__header">
    <div class="app-page-header__content">
      <h2>Skapa en deltagare</h2>
    </div>

    <button type="button" class="app-back-button" (click)="goBack()">Tillbaka</button>
  </header>

  <form (ngSubmit)="createPerson(nameInput.value)">
    <div class="form-input">
      <label for="name">Namn</label>
      <input #nameInput type="text" id="name" name="name" required placeholder="Namn" />
    </div>

    <button type="submit">Skapa deltagare</button>
  </form>
</app-layout>
