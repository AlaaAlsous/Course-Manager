<app-layout [title]="title()">
  <header class="app-page-header participant-creator__header">
    <div class="app-page-header__content">
      <h2>Create a Participant</h2>
    </div>

    <button type="button" class="app-back-button" (click)="goBack()">Back</button>
  </header>

  <form (ngSubmit)="createPerson(nameInput.value)">
    <div class="form-input">
      <label for="name">Name</label>
      <input #nameInput type="text" id="name" name="name" required placeholder="Enter name" />
    </div>

    <div class="actions">
      <button type="submit" class="primary">Create Participant</button>
    </div>
  </form>
</app-layout>
