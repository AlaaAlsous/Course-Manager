<div class="modal-overlay" (click)="onClose()">
  <div
    class="modal-card"
    (click)="$event.stopPropagation()"
    role="dialog"
    aria-modal="true"
    aria-labelledby="create-course-title"
  >
    <h2 id="create-course-title">Skapa kurs</h2>

    <form (ngSubmit)="onSubmit()">
      <label for="course-name">Namn</label>
      <input id="course-name" name="name" type="text" [(ngModel)]="name" required />

      <label for="course-description">Beskrivning</label>
      <textarea
        id="course-description"
        name="description"
        rows="4"
        [(ngModel)]="description"
        required
      ></textarea>

      @if (submitted && !isFormValid) {
        <p class="validation">Båda fälten är obligatoriska.</p>
      }

      <div class="actions">
        <button type="button" class="secondary" (click)="onClose()">Avbryt</button>
        <button type="submit" class="primary">Skapa kurs</button>
      </div>
    </form>
  </div>
</div>
