<app-layout [title]="title()">
  <div class="detail-page">
    <button type="button" class="app-back-button" (click)="goBack()">Tillbaka</button>

    <div class="hero-card">
      @if (selectedPerson?.imageUrl) {
        <img class="profile-image" [src]="selectedPerson.imageUrl" [alt]="selectedPerson.fullName" />
      }

      <div class="hero-info">
        @if (isEditing()) {
          <input class="inline-edit-input" [(ngModel)]="editName" (keyup.enter)="saveEdit()" />
          <button type="button" class="app-back-button" (click)="saveEdit()">Spara</button>
          <button type="button" class="app-back-button" (click)="cancelEdit()">Avbryt</button>
        } @else {
          <h1>{{ selectedPerson.fullName }}</h1>
          <button type="button" class="app-back-button" (click)="startEdit()">Redigera</button>
        }
        <p>ID: {{ selectedPerson.personId }}</p>
      </div>
    </div>

    <div class="section">
      <h2>Grupper</h2>
      <span>TODO</span>
      <h2>Kurstillfällen</h2>
      <span>TODO</span>

      @for (course of (selectedPerson?.courses ?? []); track course) {
        <div class="note-card">
          <p>{{ course }}</p>
        </div>
      }
    </div>

    <div class="section">
      <app-content-module></app-content-module>
    </div>
  </div>
</app-layout>
