<app-layout [title]="title()">
<div class="detail-page">

  <div class="hero-card">

    <img
      class="profile-image"
      [src]="selectedPerson?.imageUrl"
      [alt]="selectedPerson?.name"
    />

    <div class="hero-info">

      <h1>{{ selectedPerson?.name }}</h1>

      <p>{{ selectedPerson?.email }}</p>

      <p>{{ selectedPerson?.phone }}</p>

      <p>{{ selectedPerson?.address }}</p>

      <p>ID: {{ selectedPerson?.id }}</p>

    </div>

  </div>

  <div class="section">

  <h2>Courses</h2>

  <div
    class="note-card"
    *ngFor="let course of selectedPerson?.courses"
  >

    <p>{{ course }}</p>

  </div>



  </div>

  <div class="section">

    <h2>Notes</h2>

    <div
      class="note-card"
      *ngFor="let note of selectedPerson?.notes"
    >

      <p>{{ note.text }}</p>

      <small>{{ note.createdAt }}</small>

    </div>

  </div>

</div>
<div class="section">

  <h2>Gallery</h2>

  <div class="gallery">

    <img
      class="gallery-image"
      *ngFor="let image of selectedPerson?.gallery"
      [src]="image"
      alt="Participant image"
    />

  </div>

</div>
</app-layout>
