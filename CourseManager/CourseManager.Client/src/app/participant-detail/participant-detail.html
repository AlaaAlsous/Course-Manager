<app-layout [title]="title()">
  <div class="detail-page">
    <button type="button" class="app-back-button" (click)="goBack()">Tillbaka</button>

    <div class="hero-card">
      <img class="profile-image" [src]="selectedPerson?.imageUrl" [alt]="selectedPerson?.name" />

      <div class="hero-info">
        <h1>{{ selectedPerson?.name }}</h1>

        <p>{{ selectedPerson?.email }}</p>

        <p>{{ selectedPerson?.phone }}</p>

        <p>{{ selectedPerson?.address }}</p>

        <p>ID: {{ selectedPerson?.id }}</p>
      </div>
    </div>

    <div class="section">
      <h2>Courses</h2>

      <div class="note-card" *ngFor="let course of selectedPerson?.courses">
        <p>{{ course }}</p>
      </div>
    </div>

    <div class="section">
      <app-content-module></app-content-module>
    </div>
  </div>
</app-layout>
