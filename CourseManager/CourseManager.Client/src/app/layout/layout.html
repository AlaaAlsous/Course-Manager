<div class="app-root-layout">
  <header class="top-nav">
    <div class="top-nav__logo" (click)="redirectHome()">KursHanterare</div>

    <button class="hamburger" [class.active]="menuOpen()" (click)="toggleMenu()">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="top-nav__links" [class.open]="menuOpen()">
      <a routerLink="/all-courses" (click)="closeMenu()">Kurser</a>
      <a routerLink="/participants" (click)="closeMenu()">Deltagare</a>
    </nav>
  </header>

  <section class="title-bar">
    <h1>{{ title }}</h1>
    <ng-content select="[title-actions]"></ng-content>
  </section>

  <main class="page-container">
    <section class="page-sheet">
      <ng-content></ng-content>
    </section>
  </main>

  <footer class="site-footer">
    <p>KursHanterare - Din styrbara utbildningsplattform</p>
  </footer>
</div>
