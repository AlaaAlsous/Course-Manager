<div class="app-root-layout">
  <header class="top-nav">
    <div class="top-nav__breadish">
      <span (click)="redirectHome()" style="cursor: pointer"> Programhanteraren </span>
      @if (title.length > 0) {
        <span style="color: var(--color-text-muted)"> / </span>
        <span>{{ title }}</span>
      }
    </div>

    <div class="top-nav__actions">
      <ng-content select="[title-actions]"></ng-content>
    </div>

    <button class="hamburger" [class.active]="menuOpen()" (click)="toggleMenu()">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav class="top-nav__links" [class.open]="menuOpen()">
      <a routerLink="/all-courses" (click)="closeMenu()">Program</a>
      <a routerLink="/participants" (click)="closeMenu()">Deltagare</a>
    </nav>
  </header>

  <main class="page-container">
    <section class="page-sheet">
      <ng-content></ng-content>
    </section>
  </main>

  <footer class="site-footer">
    <p>Programhanteraren - Din styrbara utbildningsplattform</p>
  </footer>
</div>
