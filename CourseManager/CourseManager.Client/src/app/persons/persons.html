<app-layout [title]="title()">
  <section title-actions class="title-search">
    <button
      type="button"
      class="title-search__toggle"
      aria-label="Show search"
      (click)="searchInput.focus()"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="m21 21-4.35-4.35" />
        <circle cx="11" cy="11" r="6" />
      </svg>
    </button>
    <input
      #searchInput
      type="search"
      placeholder="Search participants..."
      (input)="onSearchChange($event)"
    />
  </section>

  <section class="participants-overview" aria-label="Participants overview">
    <h2 class="participants-overview__heading">Participants</h2>

    @if (persons().length === 0) {
      <p class="empty-state">No participants yet. Create one to get started.</p>
    } @else if (filteredPersons().length === 0 && isSearching()) {
      <p class="empty-state">No participants match "{{ searchTerm() }}".</p>
    }

    <div class="participant-list">
      @for (person of filteredPersons(); track person.id) {
        <article
          class="participant-item"
          [routerLink]="['/participant']"
          [queryParams]="{ id: person.id, from: 'list' }"
        >
          <span class="participant-item__name">{{ person.fullName }}</span>

          <div class="participant-item__actions">
            <svg class="icon" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
              <path
                fill-rule="evenodd"
                d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z"
                clip-rule="evenodd"
              />
            </svg>

            <button
              class="participant-item__delete"
              (click)="deletePerson(person.id, person.fullName, $event)"
              title="Delete participant"
            >
              <svg viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path
                  fill-rule="evenodd"
                  d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z"
                  clip-rule="evenodd"
                />
              </svg>
            </button>
          </div>
        </article>
      }
    </div>
  </section>
</app-layout>
