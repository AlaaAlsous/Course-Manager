<app-layout [title]="title()">
  <section title-actions class="title-search">
    <input type="search" placeholder="Sök i deltagare..." (input)="onSearchChange($event)" />
  </section>

  <section class="participants-overview" aria-label="Participants overview">
    <h2 class="participants-overview__heading">Deltagare</h2>

    <div class="participant-list">
      <article
        class="participant-item"
        *ngFor="let person of filteredPersons()"
        [routerLink]="['/participant']"
        [queryParams]="{ id: person.id }"
      >
        {{ person.name }}
      </article>
    </div>
  </section>
</app-layout>
