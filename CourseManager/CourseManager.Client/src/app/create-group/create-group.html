<app-layout [title]="title()">
  <div class="create-group-container">
    <header class="app-page-header create-group-header">
      <div class="app-page-header__content">
        <h2>Skapa Grupp</h2>
      </div>

      <button type="button" class="app-back-button" (click)="goBack()">Tillbaka</button>
    </header>

    <label>
      Gruppnamn
      <input type="text" [(ngModel)]="name" placeholder="Önskat Gruppnamn..." />
    </label>

    <section class="card">
      <div class="d-flex gap-1">
        <h3>Lägg Till Deltagare</h3>
        <sub class="text-muted">(valfritt)</sub>
      </div>

      <label>
        <span>Skapa en ny deltagare</span>
        <div class="d-flex gap-1 w-full">
          <input
            ngModel
            #personNameInput
            placeholder="Skriv ett namn"
            class="w-available mr-1"
            type="text"
          />
          <button class="" (click)="createPerson()">Skapa Person</button>
        </div>

        <span>Välj en existerande deltagare</span>
        <div class="d-flex gap-1 w-full">
          <select class="w-available mr-1" [(ngModel)]="selectedPersonId">
            <option [ngValue]="null">Välj...</option>
            <option *ngFor="let p of allPeople" [ngValue]="p.id">
              {{ p.name }}
            </option>
          </select>
          <button (click)="addExistingPerson()">Lägg till i Grupp</button>
        </div>
      </label>
    </section>

    @if (groupPeople().length > 0) {
      <section class="card">
        <h3>Personer i denna Grupp</h3>

        <ul>
          <li class="person-in-group-list-item" *ngFor="let p of groupPeople()">
            <span>{{ p.name }}</span>
            <button type="button" class="delete-button" (click)="removePersonFromGroup(p.id)">
              Ta bort
            </button>
          </li>
        </ul>
      </section>
    }
    <div class="create-group-actions">
      <button type="button" class="create-btn" (click)="createGroup()">Skapa Grupp</button>
    </div>
  </div>

  <app-snackbar></app-snackbar>
</app-layout>
