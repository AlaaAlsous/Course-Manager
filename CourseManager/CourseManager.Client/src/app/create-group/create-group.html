<app-layout [title]="title()">
  <div class="create-group-container">
    <h2>Create Group</h2>

    <label>
      Group Name
      <input type="text" [(ngModel)]="name" placeholder="Enter group name" />
    </label>

    <button class="create-person-btn" (click)="goToCreatePerson()">Create Person</button>

    <section class="card">
      <h3>Add Existing Person</h3>

      <label>
        Select Person
        <select [(ngModel)]="selectedPersonId">
          <option [ngValue]="null">Choose...</option>
          <option *ngFor="let p of allPeople" [ngValue]="p.id">
            {{ p.name }}
          </option>
        </select>
      </label>

      <button (click)="addExistingPerson()">Add to Group</button>
    </section>

    <section class="card">
      <h3>People in this Group</h3>

      <ul>
        <li *ngFor="let p of groupPeople">
          {{ p.name }}
        </li>
      </ul>
    </section>

    <button class="create-btn" (click)="createGroup()">Create Group</button>
  </div>
</app-layout>
