<app-layout [title]="title()">
  <section class="edit-group">
    @if (group()) {
      <header class="edit-group__header">
        <div class="app-page-header__content">
          <h2>Edit Group</h2>
          <p>Update the selected group name.</p>
        </div>

        <button type="button" class="app-back-button" (click)="cancel()">
          Back to group
        </button>
      </header>

      <label class="edit-group__field">
        Group Name
        <input type="text" [(ngModel)]="name" placeholder="Enter group name" />
      </label>

      @if (statusMessage()) {
        <p class="edit-group__status">{{ statusMessage() }}</p>
      }

      <div class="edit-group__actions">
        <button type="button" (click)="saveGroup()">Save</button>
        <button type="button" class="delete-button btn-sm" (click)="deleteGroup()" title="Delete">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/><line x1="10" y1="11" x2="10" y2="17"/></svg>
        </button>
      </div>
    } @else {
      <h2>Group not found</h2>
      <p>The selected group does not exist.</p>

      <button type="button" class="app-back-button" (click)="cancel()">
        Back to groups
      </button>
    }
  </section>
</app-layout>
