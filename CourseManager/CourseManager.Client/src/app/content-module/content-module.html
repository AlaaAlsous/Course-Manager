<div class="content-module">
  <div class="content-module__container">
    <div>
      <div class="mt-1 d-flex flex-row gap-1">
        <h3 class="">Innehåll</h3>
        <button class="content-module__action-btn" (click)="triggerFileUpload()">
          Ladda upp fil
        </button>
      </div>

      <!-- File actions toolbar -->
      <div class="d-flex gap-1 mb-1">
        <!-- Hidden file input for disk upload -->
        <input
          #fileInput
          type="file"
          multiple
          (change)="onFilesSelected($event)"
          class="content-module__file-input"
          accept="*"
        />
      </div>

      <div class="content-module__note-section mb-1">
        <textarea
          class="content-module__note-textarea"
          [(ngModel)]="noteContent"
          placeholder="Skriv en anteckning..."
        ></textarea>
        <div class="content-module__note-actions">
          <button
            class="content-module__note-save-btn"
            (click)="publishNote()"
            [disabled]="!noteContent.trim()"
          >
            Spara
          </button>
        </div>
      </div>

      <ul class="content-module__content-list">
        @for (group of groupedFileItems; track group.dateKey) {
          <li class="mt-2 content-module__date-header">
            <span class="fw-600 text-muted">{{ group.dateKey }}</span>
          </li>
          @for (item of group.items; track item) {
            <li class="mb-2">
              <div class="d-flex align-items-center justify-space-between">
                <span>{{ item.name }}.{{ item.extension }}</span>
                <div class="d-flex gap-1">
                  <a
                    class="text-primary"
                    [href]="item.sourceUrl"
                    [download]="item.name + '.' + item.extension"
                    title="Ladda ner"
                    >⤓</a
                  >

                  <button
                    class="content-module__icon-btn text-danger"
                    (click)="onDeleteFile(item)"
                    title="Ta bort"
                  >
                    ✕
                  </button>
                </div>
              </div>
              <div class="">
                <app-file-preview [file]="item" />
              </div>
            </li>
          }
        }
      </ul>
    </div>
  </div>
</div>
