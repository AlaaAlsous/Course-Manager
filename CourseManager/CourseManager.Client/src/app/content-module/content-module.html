<div class="content-module">
  <div class="content-module__collapsible-container">
    <div class="content-module__button-container">
      <button (click)="toggleCollapse(1)" class="content-module__toggle-btn">
        {{ (isNotesCollapsed ? '▼' : '▲') + ' ' + 'Notes' }}
      </button>
    </div>

    @if (!isNotesCollapsed) {
      <div class="content-module__collapsible-content">
        <div class="container">
          <div class="container">
            <button
              class="content-module__fullscreen-button"
              [class.fullscreen]="isNoteFullscreen"
              id="fullscreen-button"
              (click)="toggleNoteFullscreen()"
            >
              <span> {{ isNoteFullscreen ? '🗕' : '⛶' }}</span>
            </button>
          </div>
          <textarea
            [class.fullscreen]="isNoteFullscreen"
            [value]="noteText()"
            (input)="onNoteInput($event)"
          ></textarea>
          <ul>
            @for (item of noteItems(); track item) {
              <li>
                <a (click)="noteItemClick.emit(item)">{{ item }}</a>
              </li>
            }
          </ul>
        </div>
      </div>
    }
  </div>
  <div class="content-module__collapsible-container">
    <div class="content-module__button-container">
      <button (click)="toggleCollapse(2)" class="content-module__toggle-btn">
        {{ (isImagesCollapsed ? '▼' : '▲') + ' ' + 'Images' }}
      </button>
    </div>

    @if (!isImagesCollapsed) {
      <div class="content-module__collapsible-content">
        <ul>
          @for (item of imageItems(); track item) {
            <li>
              <a (click)="imageItemClick.emit(item)">{{ item }}</a>
            </li>
          }
        </ul>
      </div>
    }
  </div>
  <div class="content-module__collapsible-container">
    <div class="content-module__button-container">
      <button (click)="toggleCollapse(3)" class="content-module__toggle-btn">
        {{ (isVRCollapsed ? '▼' : '▲') + ' ' + 'Voice Recordings' }}
      </button>
    </div>

    @if (!isVRCollapsed) {
      <div class="content-module__collapsible-content">
        <ul>
          @for (item of voiceItems(); track item) {
            <li>
              <a (click)="voiceItemClick.emit(item)">{{ item }}</a>
            </li>
          }
        </ul>
      </div>
    }
  </div>
</div>
