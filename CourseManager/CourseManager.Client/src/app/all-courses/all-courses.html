<app-layout [title]="title()">
  <section title-actions class="title-search">
    <button
      type="button"
      class="title-search__toggle"
      aria-label="Visa sökfält"
      (click)="searchInput.focus()"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="m21 21-4.35-4.35" />
        <circle cx="11" cy="11" r="6" />
      </svg>
    </button>
    <input #searchInput type="search" placeholder="Sök i program..." (input)="onSearchChange($event)" />
  </section>

  <section class="courses-overview" aria-label="All courses overview">
    <h2 class="courses-overview__heading">Tillgängliga program</h2>

    <p *ngIf="filteredCourses().length === 0" class="empty-state">Inga program att visa.</p>

    <div class="course-list" *ngIf="filteredCourses().length > 0">
      <article
        class="course-card"
        *ngFor="let c of filteredCourses()"
        [routerLink]="['/course', c.id]"
      >
        {{ c.name }}
      </article>
    </div>
  </section>
</app-layout>
